<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Status | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="status-view.css">

</head>

<body>

<div class="status-screen">

    <div class="progress-row" id="progressRow"></div>

    <header class="status-header">

        <button class="sv-back" id="svBack" title="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <div class="sv-avatar" id="svAvatar">OC</div>

        <div class="sv-meta">
            <h1 id="svName">Name</h1>
            <p id="svTime">12:00 PM</p>
        </div>

        <button class="sv-more" title="More">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="19" r="1.6" fill="currentColor"/></svg>
        </button>

    </header>

    <main class="status-content" id="statusContent">

        <div class="quote-card" id="quoteCard">

            <p class="quote-text" id="quoteText">Quote goes here</p>

            <span class="quote-credit" id="quoteCredit">@onechat_quotes</span>

        </div>

    </main>

    <footer class="status-footer">

        <div class="reply-field">
            <input type="text" id="replyInput" placeholder="Reply">
        </div>

        <div class="reaction-icons">
            <button class="reaction" data-emoji="😍">😍</button>
            <button class="reaction" data-emoji="😂">😂</button>
            <button class="reaction" data-emoji="😮">😮</button>
        </div>

        <button class="heart-btn" id="heartBtn" title="Like">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
        </button>

    </footer>

</div>

<script src="app.js"></script>
<script src="status-view.js"></script>

</body>

</html>
