<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Permissions | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="permissions.css">

</head>

<body>

<div class="permissions-screen">

    <div class="top-section">

        <h1>Stay connected</h1>

        <p>Turn these on to get the most out of OneChat.</p>

    </div>

    <div class="middle-section">

        <div class="permission-item" data-permission="contacts">

            <div class="permission-icon">👥</div>

            <div class="permission-text">
                <h3>Contacts</h3>
                <p>Find friends who already use OneChat.</p>
            </div>

            <label class="switch">
                <input type="checkbox" class="permission-toggle" checked>
                <span class="slider"></span>
            </label>

        </div>

        <div class="permission-item" data-permission="notifications">

            <div class="permission-icon">🔔</div>

            <div class="permission-text">
                <h3>Notifications</h3>
                <p>Get notified about new messages instantly.</p>
            </div>

            <label class="switch">
                <input type="checkbox" class="permission-toggle" checked>
                <span class="slider"></span>
            </label>

        </div>

        <div class="permission-item" data-permission="microphone">

            <div class="permission-icon">🎙️</div>

            <div class="permission-text">
                <h3>Microphone</h3>
                <p>Send voice messages and make calls.</p>
            </div>

            <label class="switch">
                <input type="checkbox" class="permission-toggle">
                <span class="slider"></span>
            </label>

        </div>

        <div class="permission-item" data-permission="camera">

            <div class="permission-icon">📷</div>

            <div class="permission-text">
                <h3>Camera</h3>
                <p>Share photos and make video calls.</p>
            </div>

            <label class="switch">
                <input type="checkbox" class="permission-toggle">
                <span class="slider"></span>
            </label>

        </div>

    </div>

    <div class="bottom-section">

        <button id="continueBtn">Continue</button>

        <a href="#" id="skipLink">Skip for now</a>

    </div>

</div>

<script src="app.js"></script>
<script type="module" src="permissions.js"></script>

</body>

</html>
