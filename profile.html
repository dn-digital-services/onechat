<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="profile.css">

</head>

<body>

<div class="profile-screen">

    <header class="profile-header">

        <h1>Profile</h1>

    </header>

    <div class="profile-card">

        <div class="profile-avatar" id="profileAvatar">OC</div>

        <h2 id="profileName">OneChat User</h2>
        <p id="profileIdentifier">Not signed in</p>

    </div>

    <div class="settings-list">

        <div class="settings-item">
            <span class="settings-icon">👤</span>
            <span class="settings-label">Account</span>
            <span class="settings-arrow">›</span>
        </div>

        <div class="settings-item">
            <span class="settings-icon">🔔</span>
            <span class="settings-label">Notifications</span>
            <span class="settings-arrow">›</span>
        </div>

        <div class="settings-item">
            <span class="settings-icon">🔒</span>
            <span class="settings-label">Privacy</span>
            <span class="settings-arrow">›</span>
        </div>

        <div class="settings-item">
            <span class="settings-icon">🛠️</span>
            <span class="settings-label">Permissions</span>
            <span class="settings-arrow">›</span>
        </div>

        <div class="settings-item">
            <span class="settings-icon">❓</span>
            <span class="settings-label">Help & Support</span>
            <span class="settings-arrow">›</span>
        </div>

    </div>

    <button id="logoutBtn">Log out</button>

    <nav class="bottom-nav">

        <a href="home.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Chats</span>
        </a>

        <a href="permissions.html" class="nav-item">
            <span class="nav-icon">👥</span>
            <span>Contacts</span>
        </a>

        <a href="profile.html" class="nav-item active">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>

    </nav>

</div>

<script src="app.js"></script>
<script src="profile.js"></script>

</body>

</html>
