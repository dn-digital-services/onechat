<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="profile.css">

</head>

<body>

<div class="profile-screen">

    <header class="profile-header">

        <button class="icon-btn" title="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>

        <h1 id="headerName">OneChat User</h1>

        <div class="header-right">

            <button class="icon-btn" title="QR code">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M20 14v.01M14 20h3M20 20v.01"/></svg>
            </button>

            <button class="icon-btn" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
            </button>

        </div>

    </header>

    <div class="profile-card" id="profileCard" role="button" tabindex="0">

        <div class="profile-avatar" id="profileAvatar">OC</div>

        <div class="profile-name-row">
            <h2 id="profileName">OneChat User</h2>
            <svg class="verified-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>
        </div>

        <p id="profileIdentifier">Not signed in</p>

    </div>

    <div class="settings-list">

        <div class="settings-item" data-item="account">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
            </span>
            <span class="settings-label">Account</span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="settings-item" data-item="privacy">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
            </span>
            <span class="settings-label">Privacy</span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="settings-item" data-item="chats">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 1 1-3.6-6.7L21 4l-1.2 3.9A8 8 0 0 1 21 12z"/></svg>
            </span>
            <span class="settings-label">Chats</span>
            <span class="settings-badge" id="settingsChatsBadge" style="display:none;"></span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="settings-item" data-item="appearance">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 0 20c1.4 0 2-1 2-2 0-.6-.3-1-.6-1.4-.3-.4-.6-.8-.6-1.4 0-1 .8-1.7 1.8-1.7H16a4 4 0 0 0 4-4c0-5-4.5-9.5-8-9.5z"/><circle cx="7.5" cy="10.5" r="1"/><circle cx="11" cy="7" r="1"/><circle cx="15.5" cy="8.5" r="1"/></svg>
            </span>
            <span class="settings-label">Appearance</span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="settings-item" data-item="notifications">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 5.5 1.5 6.5H4.5C4.5 13.5 6 12 6 8z"/><path d="M9.5 18.5a2.5 2.5 0 0 0 5 0"/></svg>
            </span>
            <span class="settings-label">Notifications</span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="settings-item" data-item="payments">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 8h5a2 2 0 1 1 0 4H9m0 0h5m-5 0v6m0-6l4 6"/></svg>
            </span>
            <span class="settings-label">Payments</span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="settings-item" data-item="storage">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3l4 5H3l4-5z"/><path d="M17 21l-4-5h8l-4 5z"/><path d="M11 8v8"/><path d="M13 16V8"/></svg>
            </span>
            <span class="settings-label">Storage and data</span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

    </div>

    <div class="settings-list">

        <div class="settings-item" data-item="help">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.7 2.2c-.7.4-1.2.9-1.2 1.8v.5"/><path d="M12 17h.01"/></svg>
            </span>
            <span class="settings-label">Help and feedback</span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="settings-item" data-item="invite">
            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>
            </span>
            <span class="settings-label">Invite a friend</span>
            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

    </div>

    <div class="settings-list">

        <div class="settings-item account-centre" data-item="account-centre">

            <span class="settings-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 15c-2.5 0-4-1.5-4-3.5S5.5 8 8 8c1.6 0 2.7 1.4 4 3.5C13.3 9.4 14.4 8 16 8c2.5 0 4 1.5 4 3.5S18.5 15 16 15c-1.6 0-2.7-1.4-4-3.5-1.3 2.1-2.4 3.5-4 3.5z"/></svg>
            </span>

            <div class="account-centre-text">
                <span class="settings-label">Accounts Centre</span>
                <p>Control your experience across OneChat and connected apps.</p>
            </div>

            <svg class="settings-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>

        </div>

    </div>

    <button id="logoutBtn">Log out</button>

    <nav class="bottom-nav">

        <a href="updates.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            <span>Updates</span>
        </a>

        <a href="calls.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5c0 8.5 6.5 15 15 15l1-4-5-2-2 2A13 13 0 0 1 8 9l2-2-2-5z"/></svg>
            <span>Calls</span>
        </a>

        <a href="communities.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 20v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"/><circle cx="10" cy="7" r="3.5"/><path d="M22 20v-1a3.8 3.8 0 0 0-2.7-3.6"/><path d="M15.5 3.7A3.8 3.8 0 0 1 18 7a3.8 3.8 0 0 1-2.5 3.6"/></svg>
            <span>Communities</span>
        </a>

        <a href="home.html" class="nav-item">
            <span class="nav-icon-wrap">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 1 1-3.6-6.7L21 4l-1.2 3.9A8 8 0 0 1 21 12z"/><path d="M8 10h.01M12 10h.01M16 10h.01"/></svg>
                <span class="nav-badge" id="navChatsBadge" style="display:none;"></span>
            </span>
            <span>Chats</span>
        </a>

        <a href="profile.html" class="nav-item active">
            <span class="nav-icon-wrap">
                <span class="nav-avatar" id="navAvatar">OC</span>
                <span class="nav-dot"></span>
            </span>
            <span>You</span>
        </a>

    </nav>

</div>

<script src="app.js"></script>
<script type="module" src="profile.js"></script>

</body>

</html>
