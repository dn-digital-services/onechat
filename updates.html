<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Updates | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="updates.css">

</head>

<body>

<div class="updates-screen">

    <header class="updates-header">

        <button class="icon-btn" title="Menu">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="19" r="1.8" fill="currentColor"/></svg>
        </button>

    </header>

    <div class="title-row">
        <h1>Updates</h1>
    </div>

    <h3 class="section-title">Status</h3>

    <div class="status-row">

        <div class="status-avatar-wrap">
            <div class="avatar" id="myAvatar">OC</div>
            <span class="add-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </span>
        </div>

        <div class="status-text">
            <h4>Add status</h4>
            <p>Disappears after 24 hours</p>
        </div>

        <div class="status-actions">

            <button class="icon-btn filled" title="Add photo status">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 8.5V7a2 2 0 0 1 2-2h1.2l.9-1.4A1.5 1.5 0 0 1 9.4 3h5.2a1.5 1.5 0 0 1 1.3 1.6L16.8 5H18a2 2 0 0 1 2 2v1.5"/>
                    <path d="M2 8.5h20V17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/>
                    <circle cx="12" cy="13" r="3.4"/>
                </svg>
            </button>

            <button class="icon-btn filled" title="Add text status">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
            </button>

        </div>

    </div>

    <h3 class="section-title muted">Recent updates</h3>

    <div class="updates-list" id="recentUpdates"></div>

    <div class="viewed-section">

        <button class="viewed-toggle" id="viewedToggle">
            <span>Viewed updates</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
        </button>

        <div class="updates-list" id="viewedUpdates"></div>

    </div>

    <nav class="bottom-nav">

        <a href="updates.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            <span>Updates</span>
        </a>

        <a href="calls.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5c0 8.5 6.5 15 15 15l1-4-5-2-2 2A13 13 0 0 1 8 9l2-2-2-5z"/></svg>
            <span>Calls</span>
        </a>

        <a href="communities.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 20v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"/><circle cx="10" cy="7" r="3.5"/><path d="M22 20v-1a3.8 3.8 0 0 0-2.7-3.6"/><path d="M15.5 3.7A3.8 3.8 0 0 1 18 7a3.8 3.8 0 0 1-2.5 3.6"/></svg>
            <span>Communities</span>
        </a>

        <a href="home.html" class="nav-item">
            <span class="nav-icon-wrap">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 1 1-3.6-6.7L21 4l-1.2 3.9A8 8 0 0 1 21 12z"/><path d="M8 10h.01M12 10h.01M16 10h.01"/></svg>
                <span class="nav-badge">2</span>
            </span>
            <span>Chats</span>
        </a>

        <a href="profile.html" class="nav-item">
            <span class="nav-icon-wrap">
                <span class="nav-avatar" id="navAvatar">OC</span>
                <span class="nav-dot"></span>
            </span>
            <span>You</span>
        </a>

    </nav>

</div>

<script src="app.js"></script>
<script type="module" src="updates.js"></script>

</body>

</html>
