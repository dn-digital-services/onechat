<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="myprofile.css">

</head>

<body>

<div class="myprofile-screen">

    <header class="myprofile-header">

        <button class="icon-btn" id="backBtn" title="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <h1>Profile</h1>

        <span class="header-spacer"></span>

    </header>

    <div class="avatar-section">

        <button class="thought-bubble" id="thoughtBtn"><span id="thoughtText">Share a thought!</span></button>

        <div class="avatar-wrap">

            <div class="big-avatar" id="bigAvatar">OC</div>

            <button class="camera-badge" id="cameraBadge" title="Change photo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 8.5V7a2 2 0 0 1 2-2h1.2l.9-1.4A1.5 1.5 0 0 1 9.4 3h5.2a1.5 1.5 0 0 1 1.3 1.6L16.8 5H18a2 2 0 0 1 2 2v1.5"/>
                    <path d="M2 8.5h20V17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/>
                    <circle cx="12" cy="13" r="3.4"/>
                </svg>
            </button>

        </div>

        <button class="edit-link" id="editLink">Edit</button>

        <input type="file" id="avatarInput" accept="image/*" capture="user" hidden>

    </div>

    <div class="info-list">

        <div class="info-item" id="nameItem">
            <span class="info-label">Name</span>
            <span class="info-value" id="nameValue">OneChat User</span>
            <svg class="info-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="info-item" id="usernameItem">
            <span class="info-label">Username</span>
            <span class="info-value accent" id="usernameValue">Reserve username</span>
            <svg class="info-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="info-item" id="phoneItem">
            <span class="info-label">Phone number</span>
            <span class="info-value" id="phoneValue">Not set</span>
            <svg class="info-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

        <div class="info-item" id="linksItem">
            <span class="info-label">Links</span>
            <span class="info-value accent" id="linksValue">Add links</span>
            <svg class="info-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>

    </div>

    <nav class="bottom-nav">

        <a href="updates.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            <span>Updates</span>
        </a>

        <a href="calls.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5c0 8.5 6.5 15 15 15l1-4-5-2-2 2A13 13 0 0 1 8 9l2-2-2-5z"/></svg>
            <span>Calls</span>
        </a>

        <a href="communities.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 20v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"/><circle cx="10" cy="7" r="3.5"/><path d="M22 20v-1a3.8 3.8 0 0 0-2.7-3.6"/><path d="M15.5 3.7A3.8 3.8 0 0 1 18 7a3.8 3.8 0 0 1-2.5 3.6"/></svg>
            <span>Communities</span>
        </a>

        <a href="home.html" class="nav-item">
            <span class="nav-icon-wrap">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 1 1-3.6-6.7L21 4l-1.2 3.9A8 8 0 0 1 21 12z"/><path d="M8 10h.01M12 10h.01M16 10h.01"/></svg>
                <span class="nav-badge" id="navChatsBadge" style="display:none;"></span>
            </span>
            <span>Chats</span>
        </a>

        <a href="profile.html" class="nav-item active">
            <span class="nav-icon-wrap">
                <span class="nav-avatar" id="navAvatar">OC</span>
                <span class="nav-dot"></span>
            </span>
            <span>You</span>
        </a>

    </nav>

</div>

<script src="app.js"></script>
<script type="module" src="myprofile.js"></script>

</body>

</html>
