<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="welcome.css">

</head>

<body>

<div class="welcome-screen">

    <div class="bg-blob blob-top-left"></div>
    <div class="bg-blob blob-top-right"></div>
    <div class="bg-blob blob-mid-right"></div>
    <div class="bg-dot dot-1"></div>
    <div class="bg-dot dot-2"></div>
    <div class="bg-dot dot-3"></div>

    <div class="top-section">

        <div class="logo-badge">

            <img
            src="logo.PNG"
            class="logo"
            alt="OneChat">

        </div>

    </div>

    <div class="hero-illustration">

        <svg class="hero-path" viewBox="0 0 220 160" fill="none">
            <path d="M18 96C6 70 20 34 60 20C100 6 140 18 158 10" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 7" stroke-linecap="round"/>
        </svg>

        <div class="bubble-cluster">

            <div class="bubble bubble-ghost">
                <span class="ghost-line line-1"></span>
                <span class="ghost-line line-2"></span>
                <span class="ghost-line line-3"></span>
            </div>

            <div class="bubble bubble-main">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <div class="bubble bubble-small">
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <div class="icon-chip chip-lock">
                <svg viewBox="0 0 24 24" fill="none"><path d="M6 11V8a6 6 0 0 1 12 0v3" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/><rect x="4" y="11" width="16" height="10" rx="3" fill="#2563EB"/></svg>
            </div>

            <div class="icon-chip chip-plane">
                <svg viewBox="0 0 24 24" fill="none"><path d="M21 3 3 10.5l6.5 2.5L12 21l3-8 6-10Z" fill="#2563EB"/></svg>
            </div>

        </div>

    </div>

    <div class="middle-section">

        <span class="eyebrow">Live &amp; secure messaging</span>

        <h1>
            Welcome to
            <br>
            OneChat
        </h1>

        <p>
            Connect with people everywhere,
            instantly and securely.
        </p>

    </div>

    <div class="feature-grid">

        <div class="feature-card">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 4 5v6c0 5 3.4 8.7 8 11 4.6-2.3 8-6 8-11V5l-8-3Z" fill="#2563EB"/><path d="M9.5 12.5 11 14l3.5-4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h3>Secure</h3>
            <p>End-to-end encryption</p>
        </div>

        <div class="feature-card">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#2563EB"/></svg>
            </div>
            <h3>Fast</h3>
            <p>Instant delivery every time</p>
        </div>

        <div class="feature-card">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.5 21 3 13.5 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.3 1.1L6.6 10.8Z" fill="#2563EB"/></svg>
            </div>
            <h3>HD Calls</h3>
            <p>High quality voice &amp; video</p>
        </div>

        <div class="feature-card">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="3" fill="#2563EB"/><circle cx="8.5" cy="9.5" r="1.5" fill="#fff"/><path d="m4 17 4.5-5 3.5 4 2.5-3L20 17.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h3>Share</h3>
            <p>Photos, videos &amp; documents</p>
        </div>

    </div>

    <div class="bottom-section">

        <button
        id="startBtn">

        <span>Get Started</span>

        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>

        </button>

        <p class="login-text">

            Already have an account?

            <a href="login.html">

            Login

            </a>

        </p>

    </div>

    <svg class="bottom-wave" viewBox="0 0 500 60" preserveAspectRatio="none">
        <path d="M0 30C100 60 200 0 300 20C380 36 440 10 500 20V60H0Z" fill="#EFF6FF"/>
    </svg>

</div>

<script src="app.js"></script>
<script src="welcome.js"></script>

</body>

</html>
