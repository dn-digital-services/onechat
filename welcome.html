<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome | OneChat</title>

<link rel="preload" as="image" href="logo.PNG" fetchpriority="high">
<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="welcome.css">

</head>

<body>

<div class="welcome-screen">

    <div class="bg-blob blob-top-left"></div>
    <div class="bg-blob blob-top-right"></div>
    <div class="bg-blob blob-mid-right"></div>
    <div class="bg-dot dot-1"></div>
    <div class="bg-dot dot-2"></div>
    <div class="bg-dot dot-3"></div>

    <div class="top-section">

        <div class="logo-badge">

            <img
            src="logo.PNG"
            class="logo"
            alt="OneChat"
            width="118"
            height="118"
            fetchpriority="high"
            loading="eager"
            decoding="sync">

        </div>

    </div>

    <div class="hero-illustration">

        <div class="corner-badge badge-lock">
            <svg viewBox="0 0 24 24" fill="none"><path d="M7 10.5V8a5 5 0 0 1 10 0v2.5" stroke="#2563EB" stroke-width="1.8" stroke-linecap="round"/><rect x="5.5" y="10.5" width="13" height="9" rx="2.6" fill="#2563EB"/></svg>
        </div>

        <div class="corner-badge badge-image">
            <svg viewBox="0 0 24 24" fill="none"><rect x="3.5" y="5" width="17" height="14" rx="2.6" stroke="#2563EB" stroke-width="1.8"/><circle cx="8.2" cy="9.5" r="1.4" fill="#2563EB"/><path d="m5 16 4-4 3.2 3 3-3.4L20 16" stroke="#2563EB" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>

        <div class="corner-badge badge-call">
            <svg viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.5 21 3 13.5 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.3 1.1L6.6 10.8Z" fill="#2563EB"/></svg>
        </div>

        <div class="corner-badge badge-bolt">
            <svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#2563EB"/></svg>
        </div>

        <div class="phone-mockup">

            <div class="phone-screen">

                <span class="notch"></span>

                <div class="screen-header">
                    <span class="avatar-dot"></span>
                    <span class="header-line"></span>
                    <span class="menu-dot"></span>
                    <span class="menu-dot"></span>
                    <span class="menu-dot"></span>
                </div>

                <div class="screen-body">
                    <span class="skeleton-line w70"></span>
                    <span class="skeleton-line w45"></span>
                    <span class="skeleton-line w60"></span>
                </div>

                <div class="screen-input">
                    <span class="input-pill">Type a message</span>
                    <span class="send-fab">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M21 3 3 10.5l6.5 2.5L12 21l3-8 6-10Z" fill="#fff"/></svg>
                    </span>
                </div>

            </div>

        </div>

        <div class="float-bubble bubble-blue">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="float-bubble bubble-white">
            <span class="ghost-line line-1"></span>
            <span class="ghost-line line-2"></span>
        </div>

    </div>

    <div class="middle-section">

        <span class="eyebrow">Live &amp; secure messaging</span>

        <h1>
            Welcome to <span class="accent">OneChat</span>
        </h1>

        <p>
            Connect with people everywhere,
            instantly and securely.
        </p>

    </div>

    <div class="feature-grid">

        <div class="feature-card">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 4 5v6c0 5 3.4 8.7 8 11 4.6-2.3 8-6 8-11V5l-8-3Z" fill="#fff"/><path d="M9.5 12.5 11 14l3.5-4" stroke="#2563EB" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h3>Secure</h3>
            <p>End-to-end encryption</p>
        </div>

        <div class="feature-card">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#fff"/></svg>
            </div>
            <h3>Fast</h3>
            <p>Instant delivery every time</p>
        </div>

        <div class="feature-card">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.5 21 3 13.5 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.3 1.1L6.6 10.8Z" fill="#fff"/></svg>
            </div>
            <h3>HD Calls</h3>
            <p>High quality voice &amp; video</p>
        </div>

        <div class="feature-card">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="3" fill="#fff"/><circle cx="8.5" cy="9.5" r="1.5" fill="#2563EB"/><path d="m4 17 4.5-5 3.5 4 2.5-3L20 17.5" stroke="#2563EB" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h3>Share</h3>
            <p>Photos, videos &amp; documents</p>
        </div>

    </div>

    <div class="bottom-section">

        <button
        id="startBtn">

        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 4 5v6c0 5 3.4 8.7 8 11 4.6-2.3 8-6 8-11V5l-8-3Z" fill="none"/><circle cx="12" cy="12" r="10" fill="rgba(255,255,255,.16)"/><circle cx="9" cy="12" r="1.1" fill="#fff"/><circle cx="12" cy="12" r="1.1" fill="#fff"/><circle cx="15" cy="12" r="1.1" fill="#fff"/></svg>

        <span>Get Started</span>

        </button>

        <p class="or-text">or</p>

        <p class="login-text">

            Already have an account?

            <a href="login.html">

            Login

            </a>

        </p>

    </div>

    <svg class="bottom-wave" viewBox="0 0 500 60" preserveAspectRatio="none">
        <path d="M0 30C100 60 200 0 300 20C380 36 440 10 500 20V60H0Z" fill="#EFF6FF"/>
    </svg>

</div>

<script src="app.js"></script>
<script src="welcome.js"></script>

</body>

</html>
