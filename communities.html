<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Communities | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="communities.css">

</head>

<body>

<div class="communities-screen">

    <header class="communities-header">

        <button class="icon-btn accent" title="New community">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>

    </header>

    <div class="title-row">
        <h1>Communities</h1>
    </div>

    <div class="empty-state">

        <div class="illustration">

            <svg viewBox="0 0 64 64" fill="none">
                <circle cx="20" cy="24" r="9" fill="#1E8E6E"/>
                <path d="M9 40c1.5-6 6-9 11-9s9.5 3 11 9" stroke="#1E8E6E" stroke-width="2.6" stroke-linecap="round" fill="none"/>
                <circle cx="46" cy="14" r="7" fill="#8BC98A"/>
                <path d="M40 12c1-2.4 3.4-4 6-4M46 8v-4" stroke="#5FA85D" stroke-width="1.8" stroke-linecap="round"/>
                <rect x="30" y="34" width="24" height="24" rx="4" fill="#1E8E6E"/>
                <path d="M36 42h12M36 50h12M42 38v16" stroke="#DFF5E6" stroke-width="2" stroke-linecap="round"/>
            </svg>

        </div>

        <h2>Stay connected with a community</h2>

        <p>Communities bring members together in topic-based groups. Any community you're added to will appear here.</p>

        <a href="#" class="example-link">
            See example communities
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </a>

        <button class="new-community-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            New community
        </button>

    </div>

    <nav class="bottom-nav">

        <a href="updates.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            <span>Updates</span>
        </a>

        <a href="calls.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5c0 8.5 6.5 15 15 15l1-4-5-2-2 2A13 13 0 0 1 8 9l2-2-2-5z"/></svg>
            <span>Calls</span>
        </a>

        <a href="communities.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 20v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"/><circle cx="10" cy="7" r="3.5"/><path d="M22 20v-1a3.8 3.8 0 0 0-2.7-3.6"/><path d="M15.5 3.7A3.8 3.8 0 0 1 18 7a3.8 3.8 0 0 1-2.5 3.6"/></svg>
            <span>Communities</span>
        </a>

        <a href="home.html" class="nav-item">
            <span class="nav-icon-wrap">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 1 1-3.6-6.7L21 4l-1.2 3.9A8 8 0 0 1 21 12z"/><path d="M8 10h.01M12 10h.01M16 10h.01"/></svg>
                <span class="nav-badge" id="navChatsBadge" style="display:none;"></span>
            </span>
            <span>Chats</span>
        </a>

        <a href="profile.html" class="nav-item">
            <span class="nav-icon-wrap">
                <span class="nav-avatar" id="navAvatar">OC</span>
                <span class="nav-dot"></span>
            </span>
            <span>You</span>
        </a>

    </nav>

</div>

<script src="app.js"></script>
<script type="module" src="communities.js"></script>

</body>

</html>
