<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New chat | OneChat</title>

<link rel="stylesheet" href="variables.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="new-chat.css">

</head>

<body>

<div class="new-chat-screen">

    <header class="nc-header">

        <button class="back-btn" id="backBtn" title="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <h1>New chat</h1>

    </header>

    <!-- Search mode tabs -->
    <div class="nc-tabs">
        <button class="nc-tab active" id="tabPhone" data-tab="phone">By Phone</button>
        <button class="nc-tab" id="tabName" data-tab="name">By Name</button>
    </div>

    <!-- Phone search -->
    <form id="phoneForm" class="nc-search-form" novalidate>

        <div class="phone-input-row">
            <span class="country-code">+91</span>
            <input
            type="tel"
            id="phoneInput"
            placeholder="Enter 10-digit number"
            inputmode="numeric"
            maxlength="10"
            autocomplete="off"
            autofocus>
        </div>

        <button type="submit" id="searchBtn">Search</button>

    </form>

    <!-- Name search -->
    <form id="nameForm" class="nc-search-form hidden" novalidate>

        <div class="phone-input-row" style="padding-left:14px;">
            <input
            type="text"
            id="nameInput"
            placeholder="Enter name to search"
            autocomplete="off"
            style="padding-left:0;">
        </div>

        <button type="submit" id="nameSearchBtn">Search</button>

    </form>

    <p id="errorMsg" class="nc-error"></p>

    <div id="resultArea" class="nc-result"></div>

</div>

<script src="app.js"></script>
<script type="module" src="new-chat.js"></script>

</body>

</html>
